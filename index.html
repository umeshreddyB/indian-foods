<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Indian Food - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>South Indian States</h1>
    </header>
    <main>
        <div class="states-container">
            <div class="state-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/Emblem_of_Andhra_Pradesh.svg/1280px-Emblem_of_Andhra_Pradesh.svg.png" alt="Andhra Pradesh">
                <button onclick="location.href='andhra.html'">Andhra Pradesh</button>
            </div>
            <div class="state-card">
                <img src="https://images.seeklogo.com/logo-png/37/2/government-of-telangana-logo-png_seeklogo-378992.png" alt="Telangana">
                <button onclick="location.href='telangana.html'">Telangana</button>
            </div>
            <div class="state-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/81/TamilNadu_Logo.svg/1280px-TamilNadu_Logo.svg.png" alt="Tamil Nadu">
                <button onclick="location.href='tamilnadu.html'">Tamil Nadu</button>
            </div>
            <div class="state-card">
                <img src="https://images.seeklogo.com/logo-png/25/1/government-of-kerala-logo-png_seeklogo-252866.png" alt="Kerala">
                <button onclick="location.href='kerala.html'">Kerala</button>
            </div>
            <div class="state-card">
                <img src="https://vectorseek.com/wp-content/uploads/2023/09/The-Karnataka-Government-Kannada-Logo-Vector.svg-.png" alt="Karnataka">
                <button onclick="location.href='karnataka.html'">Karnataka</button>
            </div>
        </div>
    </main>
   
</body>
</html>
